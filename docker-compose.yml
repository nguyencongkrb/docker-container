# version: "3.9"

networks:
  backend:
    driver: bridge

volumes:
  mysql:
    driver: ${VOLUMES_DRIVER}
  postgres:
    driver: ${VOLUMES_DRIVER}
  mongo-v7:
    driver: ${VOLUMES_DRIVER}  
  redis:
    driver: ${VOLUMES_DRIVER}
  kafka:
    driver: ${VOLUMES_DRIVER}

services:
  ### MySQL ###
  mysql:
    image: arm64v8/mysql:8.4
    container_name: docker-mysql
    command: >
      mysqld --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --init-connect='SET NAMES UTF8;'
             --group_concat_max_len=5120
    environment:
      MYSQL_DATABASE: default
      MYSQL_USER: default
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    volumes:
      - ${DATA_PATH_HOST}/mysql-data:/var/lib/mysql
      - ./mysql/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - backend
    restart: always

  ### Postgres ###
  postgres:
    image: arm64v8/postgres:17-alpine
    container_name: docker-postgres
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - ${DATA_PATH_HOST}/pgdata:/var/lib/postgresql/data
      - ./postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - backend

  ### MongoDB v7 ###
  mongo_v7:
    image: arm64v8/mongo:7.0.5
    container_name: docker-mongo-v7
    volumes:
      - ${DATA_PATH_HOST}/mongo-data-v7:/data/db
      - ./mongo-v7/mongo-config:/data/configdb
    ports:
      - "27017:27017"
    networks:
      - backend
    restart: always
  ### Redis ###
  redis:
    image: arm64v8/redis:8.4-alpine
    container_name: docker-redis
    volumes:
      - ${DATA_PATH_HOST}/redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: always

